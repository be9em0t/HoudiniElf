<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>One Cloud Player</title>
    <script type="module" src="/main.js" defer></script>
  </head>

  <body>
    <!-- ===== COMPACT MODE (mini player) ===== -->
    <div id="compact-mode" class="compact-player" style="display:none">
      <div class="compact-top">
        <span class="compact-track-name" id="compact-track-title">No track</span>
        <div class="compact-top-actions">
          <button id="btn-compact-expand" class="compact-icon-btn" title="Expand">&#xeab4;</button>
          <button id="btn-compact-close" class="compact-icon-btn compact-icon-sm" title="Close">&#xea76;</button>
        </div>
      </div>
      <div class="compact-controls">
        <button id="btn-compact-loop" class="compact-icon-btn" title="Loop">&#xeb72;</button>
        <button id="btn-compact-prev" class="compact-icon-btn" title="Previous">&#xeb4e;</button>
        <button id="btn-compact-play" class="compact-play-btn" title="Play / Pause">&#xeb2c;</button>
        <button id="btn-compact-next" class="compact-icon-btn" title="Next">&#xeb4d;</button>
        <button id="btn-compact-playlist" class="compact-icon-btn" title="Track list">&#xea7c;</button>
      </div>
    </div>

    <!-- ===== EXPANDED MODE (full UI) ===== -->
    <main id="expanded-mode" class="app-shell">
      <header class="app-header">
        <div>
          <h1>One Cloud Player</h1>
          <p>Local audio listing with a simple player shell.</p>
        </div>
      </header>

      <section class="folder-panel">
        <label for="folder-input">Audio folder path</label>
        <div class="folder-actions">
          <input id="folder-input" placeholder="/Users/you/Music" />
          <button id="load-folder">Load audio</button>
          <button id="test-sound">Play tone</button>
        </div>
        <p class="status" id="status">Enter a folder and click Load audio.</p>
        <div class="debug-panel">
          <h3>Debug</h3>
          <pre id="debug-log">No audio debug events yet.</pre>
        </div>
      </section>

      <section class="player-panel">
        <div class="player-shell">
          <div class="player-meta">
            <div class="player-title" id="track-title">No track selected</div>
            <div class="player-subtitle" id="track-meta"></div>
          </div>
          <div class="player-controls">
            <button id="btn-loop" title="Loop">⟲</button>
            <button id="btn-prev" title="Previous">⟸</button>
            <button id="btn-play" title="Play / Pause">▶</button>
            <button id="btn-next" title="Next">⟹</button>
            <button id="btn-compact" title="Compact mode">⊟</button>
            <button id="btn-close" title="Close">✕</button>
          </div>
          <audio id="audio-player" controls preload="metadata"></audio>
        </div>
      </section>

      <section class="track-list-panel">
        <h2>Tracks</h2>
        <ul id="tracks" class="track-list"></ul>
      </section>
    </main>
  </body>
</html>
