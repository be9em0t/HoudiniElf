<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>One Cloud Player</title>
    <script type="module" src="/main.js" defer></script>
  </head>

  <body>
    <main class="app-shell">
      <header class="app-header">
        <div>
          <h1>One Cloud Player</h1>
          <p>Extended mode keeps the full shell; mini mode follows the Figma player.</p>
        </div>
        <div class="mode-switch" role="group" aria-label="Player layout">
          <button id="mode-extended" class="mode-button is-active" type="button">Extended</button>
          <button id="mode-mini" class="mode-button" type="button">Mini</button>
        </div>
      </header>

      <section class="folder-panel extended-only">
        <label for="folder-input">Audio folder path</label>
        <div class="folder-actions">
          <input id="folder-input" placeholder="/Users/you/Music" />
          <button id="load-folder">Load audio</button>
          <button id="test-sound">Play tone</button>
        </div>
        <p class="status" id="status">Enter a folder and click Load audio.</p>
        <div class="debug-panel">
          <h3>Debug</h3>
          <pre id="debug-log">No audio debug events yet.</pre>
        </div>
      </section>

      <section class="player-panel extended-only">
        <div class="player-shell player-shell-extended">
          <div class="player-meta">
            <div class="player-title" id="track-title">No track selected</div>
            <div class="player-subtitle" id="track-meta"></div>
          </div>
          <div class="player-controls">
            <button id="btn-loop" class="control-button control-button-text" type="button" title="Loop">Loop</button>
            <button id="btn-prev" class="control-button icon-button codicon-button" type="button" title="Previous">&#xEB8E;</button>
            <button id="btn-play" class="control-button icon-button codicon-button is-primary" type="button" title="Play / Pause">&#xead3;</button>
            <button id="btn-next" class="control-button icon-button codicon-button" type="button" title="Next">&#xeacf;</button>
            <button id="btn-expand" class="control-button icon-button codicon-button" type="button" title="Switch to mini mode">&#xeab7;</button>
            <button id="btn-close" class="control-button icon-button codicon-button" type="button" title="Close window">&#xeab8;</button>
          </div>
          <audio id="audio-player" controls preload="metadata"></audio>
        </div>
      </section>

      <section class="mini-player-panel mini-only" aria-label="Mini player">
        <div class="mini-player-frame">
          <div class="mini-player-topbar">
            <div class="mini-drag-area" id="mini-drag-area">
              <div class="mini-track-title" id="mini-track-title">No track selected</div>
            </div>
            <div class="mini-window-controls">
              <button id="mini-expand" class="mini-icon-button codicon-button" type="button" title="Switch to extended mode">&#xeab7;</button>
              <button id="mini-close" class="mini-icon-button codicon-button" type="button" title="Close window">&#xeab8;</button>
            </div>
          </div>
          <div class="mini-player-controls">
            <button id="mini-loop" class="mini-icon-button codicon-button" type="button" title="Loop">&#xeae2;</button>
            <button id="mini-prev" class="mini-icon-button codicon-button" type="button" title="Previous">&#xEB8E;</button>
            <button id="mini-play" class="mini-play-button" type="button" title="Play / Pause">
              <span class="mini-play-ring" aria-hidden="true"></span>
              <span id="mini-play-icon" class="codicon-button mini-play-glyph">&#xead3;</span>
            </button>
            <button id="mini-next" class="mini-icon-button codicon-button" type="button" title="Next">&#xeacf;</button>
            <button id="mini-playlist" class="mini-icon-button codicon-button" type="button" title="Show track list">&#xeb17;</button>
          </div>
        </div>
      </section>

      <section class="track-list-panel extended-only">
        <h2>Tracks</h2>
        <ul id="tracks" class="track-list"></ul>
      </section>
    </main>
  </body>
</html>
